{% extends "base.html" %}
{% block title %}访问验证{% endblock %}
{% block content %}
<section class="login-layout">
  <div class="login-copy">
    <p class="eyebrow">Private Access</p>
    <h1>请输入访问码</h1>
    <p>这是私人分享题库。拿到访问码后才能进入登录页或游客入口。</p>
  </div>
  <div class="login-box">
    <h2>访问验证</h2>
    <form method="post" action="{{ url_for('share_gate') }}">
      <input type="hidden" name="next" value="{{ next_url }}">
      <div class="form-group">
        <label>访问码</label>
        <input type="password" name="access_code" required autofocus autocomplete="one-time-code">
      </div>
      <button type="submit" class="btn-primary btn-block">进入题库</button>
    </form>
  </div>
</section>
{% endblock %}

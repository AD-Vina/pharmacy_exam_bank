{% extends "base.html" %}
{% block title %}登录{% endblock %}
{% block content %}
<section class="login-layout">
  <div class="login-copy">
    <p class="eyebrow">高级职称备考</p>
    <h1>西药学题库训练平台</h1>
    <p>用于本机题库练习、模拟考试、错题收藏、答案解析和来源查看。</p>
  </div>
  <div class="login-box">
    <h2>备用账号登录</h2>
    <form method="post" action="{{ url_for('login') }}">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" name="username" required autofocus autocomplete="username">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" name="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-primary btn-block">登录系统</button>
    </form>
    <div class="login-hint">
      <p>默认本机运行会自动进入系统；只有关闭 <code>LOCAL_AUTO_LOGIN</code> 后才需要使用账号。</p>
    </div>
  </div>
</section>
{% endblock %}
